name: AWS Infrastructure Pipeline

# 1. הטריגר: רץ רק כשדוחפים לענף הספציפי
on:
  push:
    branches: [ "AWS-Infrastructure" ]

jobs:
  build-push-deploy:
    # 2. השרת המריץ: השרת הפרטי שלך באמזון!
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. התחברות מאובטחת ל-AWS באמצעות הסודות שהגדרנו
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 4. התחברות ל-ECR במקום ל-Docker Hub
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. בנייה ודחיפה של תמונת הדוקר ל-ECR
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-app # שנה לשם המאגר שיצרת ב-ECR
          IMAGE_TAG: ${{ github.sha }} # משתמשים במזהה ייחודי של הקומיט בתור מספר גרסה
        run: |
          echo "Building the Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          echo "Pushing the Docker image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 6. פריסה ואימות (Deploy and Verify)
      - name: Deploy and Verify on Self-Hosted Runner
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Deploying the application..."
          
          # עוצרים ומוחקים את הקונטיינר הקודם אם הוא רץ (כדי למנוע התנגשויות)
          docker rm -f my-running-app || true
          
          # מריצים את הקונטיינר החדש מהתמונה שזה עתה דחפנו ל-ECR!
          docker run -d --name my-running-app $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # ממתינים כמה שניות כדי לתת לאפליקציה לעלות
          sleep 5
          
          echo "Verifying application is running:"
          # מדפיסים את הלוגים של הקונטיינר כדי לוודא שאין שגיאות ושהוא הדפיס Hello World
          docker logs my-running-app
